<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *, *::before, *::after {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
            body {
                  min-height:100vh;
                  background:gray;
}
.box{
      width: 80%;
      height: 50vh;
      /* border: 1px solid red; */
      margin: 100px auto;
      display: grid;
      grid-template-columns: repeat(5, 20%);
      grid-template-rows: repeat(2, 50%);
      >figure{
            border-radius: 10px;
            padding: 10px;
            /* border: 2px solid rgb(255, 255, 255); */
            position: relative;
            >figcaption{
                  position: absolute;
                  right: 10px;
                  bottom: 10px;
                  padding: 10px;
                  font-family: sans-serif;
                  color: white;
                  font-size: 20px;
                  /* box-shadow: 0 0 50px 1px black; */

            }
            >img{
                  width: 100%;
                  height: 100%;
                  object-fit: cover ;
                  border-radius: 10px;
            }
            &:nth-of-type(1){
                  grid-area: 1 / 1/ span 1 / span 1;
            }
            &:nth-of-type(2){
                  grid-area: 1 / 2 / span 2 / span 2;
            }
            &:nth-of-type(6){
                  grid-area: 2 / 4 / span 1 / span 2;
            }
            
            
      }

}
    </style>
</head>

<body>
<div class="box">
      <figure>
            <img src="images/6.jpg" alt="">
            <figcaption>elaheh</figcaption>
      </figure>
      <figure>
            <img src="images/2.jpg" alt="">
            <figcaption>elaheh</figcaption>
      </figure>
      <figure>
            <img src="images/4.jpg" alt="">
            <figcaption>elaheh</figcaption>
      </figure>
      <figure>
            <img src="images/5.jpg" alt="">
            <figcaption>elaheh</figcaption>
      </figure>
      <figure>
            <img src="images/8.jpg" alt="">
            <figcaption>elaheh</figcaption>
      </figure>
      <figure>
            <img src="images/3.jpg" alt="">
            <figcaption>elaheh</figcaption>
      </figure>
</div>

</body>

</html>
